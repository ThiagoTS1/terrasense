<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TerraSense</title>
  <style>
    :root {
      --bg: #f4f8f5;
      --text: #1e2a22;
      --card: #ffffff;
      --accent: #2f7d57;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #eef6f0, var(--bg));
      color: var(--text);
      padding: 24px;
    }

    .container {
      width: min(640px, 100%);
      text-align: center;
      background: var(--card);
      border-radius: 16px;
      padding: 36px 24px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }

    .logo {
      width: 120px;
      height: auto;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      color: var(--accent);
      margin-bottom: 12px;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="container">
    <img class="logo" src="assets/logo.png" alt="Logo da TerraSense">
    <h1>TerraSense</h1>
    <p>
      Bem-vindo(a)! Estamos preparando uma plataforma inteligente para monitorar dados ambientais
      e transformar informação em decisões sustentáveis.
    </p>
  </main>
</body>
</html>
